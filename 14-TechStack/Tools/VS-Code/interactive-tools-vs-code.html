<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Code Interactive Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --tools/vscode-blue: #3776AB;
            --tools/vscode-yellow: #FFD43B;
            --tools/vscode-green: #4CAF50;
            --tools/vscode-red: #F44336;
            --tools/vscode-purple: #9C27B0;
            --tools/vscode-dark: #2C3E50;
            --tools/vscode-light: #ECF0F1;
            --primary-color: #007ACC;
            --secondary-color: #0066B8;
            --accent-color: #4CAF50;
            --warning-color: #FF9800;
            --info-color: #2196F3;
            --dark-color: #2C3E50;
            --light-color: #ECF0F1;
        }

        body {
            font-family: 'JetBrains Mono', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #007ACC 0%, #0066B8 100%);
            min-height: 100vh;
            margin: 0;
            color: var(--tools/vscode-dark);
        }

        .demo-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .demo-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .demo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border: none;
        }

        .card-header h3 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card-body {
            padding: 25px;
        }

        .code-editor {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            overflow-x: auto;
            border: 1px solid #ccc;
            min-height: 200px;
        }

        .btn-tools/vscode {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: var(--tools/vscode-dark);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-tools/vscode:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            color: var(--tools/vscode-dark);
        }

        .btn-outline-tools/vscode {
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            background: transparent;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-outline-tools/vscode:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .feature-card {
            background: var(--tools/vscode-light);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .feature-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--tools/vscode-dark);
        }

        .feature-description {
            color: #666;
            font-size: 0.9rem;
        }

        .interactive-section {
            background: var(--tools/vscode-light);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .tab-content {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e0e0e0;
        }

        .tools/vscode-flow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(90deg, #007ACC, #0066B8);
            border-radius: 10px;
            color: white;
        }

        .flow-step {
            text-align: center;
            flex: 1;
        }

        .flow-arrow {
            font-size: 2rem;
            margin: 0 10px;
        }

        .data-structure-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid var(--primary-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .variable-display {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 8px 12px;
            margin: 2px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .library-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .library-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .performance-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .perf-metric-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--tools/vscode-dark);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .perf-metric-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .perf-metric-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .execution-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--tools/vscode-light);
            border-radius: 6px;
        }

        .stat-label {
            font-weight: 600;
            color: var(--tools/vscode-dark);
        }

        .stat-value {
            color: var(--primary-color);
            font-weight: 500;
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .code-output {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            margin-top: 10px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid #f5c6cb;
        }

        .input-group-custom {
            margin-bottom: 15px;
        }

        .input-group-custom label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--tools/vscode-dark);
        }

        .input-group-custom input,
        .input-group-custom select,
        .input-group-custom textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .input-group-custom textarea {
            min-height: 80px;
            resize: vertical;
        }

        .badge-custom {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 2px;
        }

        .badge-running {
            background: #28a745;
            color: white;
        }

        .badge-completed {
            background: #007bff;
            color: white;
        }

        .badge-failed {
            background: #dc3545;
            color: white;
        }

        .badge-queued {
            background: #ffc107;
            color: black;
        }

        .data-structure-visual {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .structure-item {
            background: var(--primary-color);
            color: white;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
        }

        .function-signature {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 10px;
            margin: 5px 0;
            font-family: 'JetBrains Mono', monospace;
            border-left: 3px solid var(--accent-color);
        }

        .class-diagram {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
        }

        .method-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .method-item {
            background: var(--tools/vscode-light);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [variables, setVariables] = useState([
                { name: 'x', value: 42, type: 'int' },
                { name: 'name', value: '"Alice"', type: 'str' },
                { name: 'numbers', value: '[1, 2, 3, 4, 5]', type: 'list' },
                { name: 'person', value: '{"name": "Bob", "age": 30}', type: 'dict' }
            ]);
            const [dataStructures, setDataStructures] = useState({
                list: [1, 2, 3, 4, 5],
                dict: { name: 'Alice', age: 25, city: 'New York' },
                set: new Set([1, 2, 3, 4, 5]),
                tuple: [1, 'hello', 3.14]
            });
            const [functions, setFunctions] = useState([
                {
                    name: 'calculate_sum',
                    params: ['a', 'b'],
                    body: 'return a + b',
                    docstring: 'Calculate the sum of two numbers'
                },
                {
                    name: 'process_data',
                    params: ['data', 'operation'],
                    body: 'return [operation(x) for x in data]',
                    docstring: 'Apply operation to each element in data'
                }
            ]);
            const [classes, setClasses] = useState([
                {
                    name: 'Person',
                    attributes: ['name', 'age', 'email'],
                    methods: ['__init__', 'greet', 'get_age', 'set_email']
                },
                {
                    name: 'Calculator',
                    attributes: ['memory'],
                    methods: ['add', 'subtract', 'multiply', 'divide', 'clear_memory']
                }
            ]);
            const [libraries, setLibraries] = useState([
                {
                    name: 'NumPy',
                    description: 'Fundamental package for array computing',
                    category: 'Scientific Computing',
                    functions: ['array', 'zeros', 'ones', 'linspace', 'random']
                },
                {
                    name: 'Pandas',
                    description: 'Powerful data structures for data analysis',
                    category: 'Data Analysis',
                    functions: ['DataFrame', 'read_csv', 'groupby', 'merge', 'pivot_table']
                },
                {
                    name: 'Matplotlib',
                    description: 'Plotting library for Python',
                    category: 'Visualization',
                    functions: ['plot', 'scatter', 'bar', 'hist', 'subplot']
                },
                {
                    name: 'Requests',
                    description: 'HTTP library for Python',
                    category: 'Web',
                    functions: ['get', 'post', 'put', 'delete', 'session']
                }
            ]);
            const [code, setCode] = useState(`// VS Code Configuration Example
{
  "editor.fontSize": 14,
  "editor.tabSize": 2,
  "editor.formatOnSave": true,
  "editor.codeActionsOnSave": {
    "source.fixAll": true
  },
  "python.defaultInterpreterPath": "./venv/bin/python",
  "files.exclude": {
    "**/__pycache__": true,
    "**/.pytest_cache": true
  },
  "extensions.recommendations": [
    "ms-python.python",
    "ms-python.vscode-pylance"
  ]
}

// Keyboard shortcuts
// Ctrl+P: Quick file open
// Ctrl+Shift+P: Command palette
// Ctrl+`: Toggle terminal
// Alt+Up/Down: Move line
// Ctrl+D: Select next occurrence`);
            const [output, setOutput] = useState('');
            const [isExecuting, setIsExecuting] = useState(false);
            const [newVariable, setNewVariable] = useState({ name: '', value: '' });
            const [newFunction, setNewFunction] = useState({ name: '', params: '', body: '', docstring: '' });
            const [selectedLibrary, setSelectedLibrary] = useState('NumPy');
            const [performance, setPerformance] = useState({
                executionTime: '45ms',
                memoryUsage: '12.5 MB',
                cpuUsage: '15%',
                linesExecuted: 23
            });

            const executeCode = async () => {
                setIsExecuting(true);
                setOutput('Executing VS Code code...\n');

                // Simulate code execution
                setTimeout(() => {
                    setOutput(prev => prev + 'VS Code code executed successfully!\n' +
                        '✓ Variables defined\n' +
                        '✓ Functions created\n' +
                        '✓ Classes instantiated\n' +
                        '✓ Libraries imported\n' +
                        '✓ Operations completed\n\n' +
                        'Output:\n' +
                        'Alice is an adult\n' +
                        'Square root of 16 is 4.0\n' +
                        'Squares: [1, 4, 9, 16, 25]\n');
                    setIsExecuting(false);
                }, 1500);
            };

            const addVariable = () => {
                if (newVariable.name && newVariable.value) {
                    const type = isNaN(newVariable.value) ? 'str' : 'int';
                    setVariables([...variables, {
                        name: newVariable.name,
                        value: newVariable.value,
                        type: type
                    }]);
                    setNewVariable({ name: '', value: '' });
                    setOutput('Variable added successfully!');
                }
            };

            const addFunction = () => {
                if (newFunction.name && newFunction.body) {
                    setFunctions([...functions, {
                        name: newFunction.name,
                        params: newFunction.params.split(',').map(p => p.trim()),
                        body: newFunction.body,
                        docstring: newFunction.docstring
                    }]);
                    setNewFunction({ name: '', params: '', body: '', docstring: '' });
                    setOutput('Function created successfully!');
                }
            };

            const runDataStructureOp = (operation, structure) => {
                let result = '';
                switch (operation) {
                    case 'append':
                        if (structure === 'list') {
                            result = 'Element appended to list';
                        }
                        break;
                    case 'pop':
                        result = 'Element removed from list';
                        break;
                    case 'keys':
                        result = 'Dictionary keys: [\'name\', \'age\', \'city\']';
                        break;
                    case 'add':
                        result = 'Element added to set';
                        break;
                    default:
                        result = `${operation} operation performed on ${structure}`;
                }
                setOutput(result);
            };

            const installPackage = (packageName) => {
                setOutput(`Installing ${packageName}...\nPackage installed successfully!`);
            };

            return (
                <div className="demo-container">
                    {/* Header */}
                    <div className="header">
                        <h1><i className="fas fa-code"></i> VS Code</h1>
                        <p>Lightweight, powerful source code editor with extensive extensions</p>
                    </div>

                    {/* Navigation Tabs */}
                    <ul className="nav nav-tabs justify-content-center mb-4">
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'overview' ? 'active' : ''}`}
                                onClick={() => setActiveTab('overview')}>
                                <i className="fas fa-info-circle"></i> Overview
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'datastructures' ? 'active' : ''}`}
                                onClick={() => setActiveTab('datastructures')}>
                                <i className="fas fa-database"></i> Data Structures
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'functions' ? 'active' : ''}`}
                                onClick={() => setActiveTab('functions')}>
                                <i className="fas fa-code"></i> Functions
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'classes' ? 'active' : ''}`}
                                onClick={() => setActiveTab('classes')}>
                                <i className="fas fa-cubes"></i> Classes
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'libraries' ? 'active' : ''}`}
                                onClick={() => setActiveTab('libraries')}>
                                <i className="fas fa-book"></i> Libraries
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'editor' ? 'active' : ''}`}
                                onClick={() => setActiveTab('editor')}>
                                <i className="fas fa-terminal"></i> Code Editor
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'performance' ? 'active' : ''}`}
                                onClick={() => setActiveTab('performance')}>
                                <i className="fas fa-tachometer-alt"></i> Performance
                            </button>
                        </li>
                    </ul>

                    {/* Tab Content */}
                    <div className="tab-content">
                        {/* Overview Tab */}
                        {activeTab === 'overview' && (
                            <div>
                                <div className="feature-grid">
                                    <div className="feature-card">
                                        <div className="feature-icon">
                                            <i className="fas fa-brain"></i>
                                        </div>
                                        <div className="feature-title">Easy to Learn</div>
                                        <div className="feature-description">
                                            Simple syntax and readable code that emphasizes developer productivity.
                                        </div>
                                    </div>
                                    <div className="feature-card">
                                        <div className="feature-icon">
                                            <i className="fas fa-cubes"></i>
                                        </div>
                                        <div className="feature-title">Versatile</div>
                                        <div className="feature-description">
                                            Web development, data science, AI, automation, and more - all in one language.
                                        </div>
                                    </div>
                                    <div className="feature-card">
                                        <div className="feature-icon">
                                            <i className="fas fa-users"></i>
                                        </div>
                                        <div className="feature-title">Large Community</div>
                                        <div className="feature-description">
                                            Extensive ecosystem with millions of packages and active developer community.
                                        </div>
                                    </div>
                                    <div className="feature-card">
                                        <div className="feature-icon">
                                            <i className="fas fa-rocket"></i>
                                        </div>
                                        <div className="feature-title">High Performance</div>
                                        <div className="feature-description">
                                            Optimized execution with libraries like NumPy providing C-like performance.
                                        </div>
                                    </div>
                                </div>

                                <div className="tools/vscode-flow">
                                    <div className="flow-step">
                                        <i className="fas fa-file-code"></i>
                                        <div>Write Code</div>
                                        <small>Simple syntax</small>
                                    </div>
                                    <div className="flow-arrow">→</div>
                                    <div className="flow-step">
                                        <i className="fas fa-play"></i>
                                        <div>Execute</div>
                                        <small>Interpreter</small>
                                    </div>
                                    <div className="flow-arrow">→</div>
                                    <div className="flow-step">
                                        <i className="fas fa-chart-bar"></i>
                                        <div>Analyze</div>
                                        <small>Results</small>
                                    </div>
                                    <div className="flow-arrow">→</div>
                                    <div className="flow-step">
                                        <i className="fas fa-share"></i>
                                        <div>Deploy</div>
                                        <small>Production</small>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Data Structures Tab */}
                        {activeTab === 'datastructures' && (
                            <div>
                                <div className="d-flex justify-content-between align-items-center mb-4">
                                    <h3>Data Structures & Variables</h3>
                                    <button className="btn btn-tools/vscode" data-bs-toggle="modal" data-bs-target="#addVariableModal">
                                        <i className="fas fa-plus"></i> Add Variable
                                    </button>
                                </div>

                                <div className="row">
                                    <div className="col-md-6">
                                        <div className="data-structure-card">
                                            <h5>Variables</h5>
                                            {variables.map((variable, index) => (
                                                <div key={index} className="variable-display">
                                                    <span><strong>{variable.name}</strong> = {variable.value}</span>
                                                    <span className="badge badge-info">{variable.type}</span>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="data-structure-card">
                                            <h5>List Operations</h5>
                                            <div className="data-structure-visual">
                                                {dataStructures.list.map((item, index) => (
                                                    <div key={index} className="structure-item">
                                                        [{index}] {item}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-2">
                                                <button className="btn btn-outline-tools/vscode btn-sm me-2"
                                                    onClick={() => runDataStructureOp('append', 'list')}>
                                                    Append
                                                </button>
                                                <button className="btn btn-outline-tools/vscode btn-sm me-2"
                                                    onClick={() => runDataStructureOp('pop', 'list')}>
                                                    Pop
                                                </button>
                                                <button className="btn btn-outline-tools/vscode btn-sm"
                                                    onClick={() => runDataStructureOp('sort', 'list')}>
                                                    Sort
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="col-md-6">
                                        <div className="data-structure-card">
                                            <h5>Dictionary Operations</h5>
                                            <div className="data-structure-visual">
                                                {Object.entries(dataStructures.dict).map(([key, value], index) => (
                                                    <div key={index} className="structure-item">
                                                        {key}: {value}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-2">
                                                <button className="btn btn-outline-tools/vscode btn-sm me-2"
                                                    onClick={() => runDataStructureOp('keys', 'dict')}>
                                                    Keys
                                                </button>
                                                <button className="btn btn-outline-tools/vscode btn-sm me-2"
                                                    onClick={() => runDataStructureOp('values', 'dict')}>
                                                    Values
                                                </button>
                                                <button className="btn btn-outline-tools/vscode btn-sm"
                                                    onClick={() => runDataStructureOp('items', 'dict')}>
                                                    Items
                                                </button>
                                            </div>
                                        </div>

                                        <div className="data-structure-card">
                                            <h5>Set Operations</h5>
                                            <div className="data-structure-visual">
                                                {Array.from(dataStructures.set).map((item, index) => (
                                                    <div key={index} className="structure-item">
                                                        {item}
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="mt-2">
                                                <button className="btn btn-outline-tools/vscode btn-sm me-2"
                                                    onClick={() => runDataStructureOp('add', 'set')}>
                                                    Add
                                                </button>
                                                <button className="btn btn-outline-tools/vscode btn-sm me-2"
                                                    onClick={() => runDataStructureOp('remove', 'set')}>
                                                    Remove
                                                </button>
                                                <button className="btn btn-outline-tools/vscode btn-sm"
                                                    onClick={() => runDataStructureOp('union', 'set')}>
                                                    Union
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Functions Tab */}
                        {activeTab === 'functions' && (
                            <div>
                                <div className="d-flex justify-content-between align-items-center mb-4">
                                    <h3>Functions & Methods</h3>
                                    <button className="btn btn-tools/vscode" data-bs-toggle="modal" data-bs-target="#addFunctionModal">
                                        <i className="fas fa-plus"></i> Create Function
                                    </button>
                                </div>

                                <div className="row">
                                    <div className="col-md-6">
                                        {functions.map((func, index) => (
                                            <div key={index} className="data-structure-card">
                                                <h6>def {func.name}({func.params.join(', ')}):</h6>
                                                <div className="function-signature">
                                                    {func.docstring && `"""${func.docstring}"""`}
                                                    <br />
                                                    {func.body}
                                                </div>
                                                <button className="btn btn-outline-tools/vscode btn-sm mt-2"
                                                    onClick={() => setOutput(`Function ${func.name} executed successfully!`)}>
                                                    <i className="fas fa-play"></i> Run Function
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="col-md-6">
                                        <div className="interactive-section">
                                            <h5>Built-in Functions</h5>
                                            <div className="row">
                                                <div className="col-md-6">
                                                    <button className="btn btn-outline-tools/vscode w-100 mb-2">
                                                        <i className="fas fa-calculator"></i> len()
                                                    </button>
                                                    <button className="btn btn-outline-tools/vscode w-100 mb-2">
                                                        <i className="fas fa-sort"></i> sorted()
                                                    </button>
                                                    <button className="btn btn-outline-tools/vscode w-100 mb-2">
                                                        <i className="fas fa-search"></i> range()
                                                    </button>
                                                </div>
                                                <div className="col-md-6">
                                                    <button className="btn btn-outline-tools/vscode w-100 mb-2">
                                                        <i className="fas fa-print"></i> print()
                                                    </button>
                                                    <button className="btn btn-outline-tools/vscode w-100 mb-2">
                                                        <i className="fas fa-input"></i> input()
                                                    </button>
                                                    <button className="btn btn-outline-tools/vscode w-100 mb-2">
                                                        <i className="fas fa-file"></i> open()
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="interactive-section">
                                            <h5>List Comprehensions</h5>
                                            <div className="code-editor" style={{ minHeight: '120px' }}>
                                                {`# List comprehensions
squares = [x**2 for x in range(1, 6)]
# [1, 4, 9, 16, 25]

even_numbers = [x for x in range(10) if x % 2 == 0]
# [0, 2, 4, 6, 8]

matrix = [[i*j for j in range(3)] for i in range(3)]
# [[0, 0, 0], [0, 1, 2], [0, 2, 4]]`}
                                            </div>
                                            <button className="btn btn-tools/vscode mt-2"
                                                onClick={() => setOutput('List comprehensions executed!\nSquares: [1, 4, 9, 16, 25]\nEven numbers: [0, 2, 4, 6, 8]')}>
                                                <i className="fas fa-play"></i> Execute
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Classes Tab */}
                        {activeTab === 'classes' && (
                            <div>
                                <h3>Object-Oriented Programming</h3>
                                <div className="row">
                                    {classes.map((cls, index) => (
                                        <div key={index} className="col-md-6 mb-3">
                                            <div className="class-diagram">
                                                <h5>class {cls.name}:</h5>
                                                <div className="mt-2">
                                                    <strong>Attributes:</strong>
                                                    <div className="data-structure-visual">
                                                        {cls.attributes.map((attr, i) => (
                                                            <div key={i} className="structure-item">
                                                                {attr}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="mt-3">
                                                    <strong>Methods:</strong>
                                                    <div className="method-list">
                                                        {cls.methods.map((method, i) => (
                                                            <div key={i} className="method-item">
                                                                {method}()
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="interactive-section">
                                    <h5>Inheritance & Polymorphism</h5>
                                    <div className="code-editor" style={{ minHeight: '150px' }}>
                                        {`class Animal:
    def __init__(self, name):
        self.name = name

    def speak(self):
        return "Some sound"

class Dog(Animal):
    def speak(self):
        return "Woof!"

class Cat(Animal):
    def speak(self):
        return "Meow!"

# Usage
dog = Dog("Buddy")
cat = Cat("Whiskers")

print(dog.speak())  # Woof!
print(cat.speak())  # Meow!`}
                                    </div>
                                    <button className="btn btn-tools/vscode mt-2"
                                        onClick={() => setOutput('Inheritance demo executed!\nDog says: Woof!\nCat says: Meow!')}>
                                        <i className="fas fa-play"></i> Run Demo
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Libraries Tab */}
                        {activeTab === 'libraries' && (
                            <div>
                                <h3>Python Libraries & Packages</h3>
                                <div className="row">
                                    <div className="col-md-4">
                                        <div className="interactive-section">
                                            <h5>Popular Libraries</h5>
                                            {libraries.map((lib, index) => (
                                                <div key={index} className="library-card">
                                                    <h6>{lib.name}</h6>
                                                    <p className="mb-1">{lib.description}</p>
                                                    <small className="text-muted">{lib.category}</small>
                                                    <button className="btn btn-outline-tools/vscode btn-sm w-100 mt-2"
                                                        onClick={() => installPackage(lib.name)}>
                                                        <i className="fas fa-download"></i> Install
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="col-md-8">
                                        <div className="interactive-section">
                                            <h5>Library Usage Examples</h5>
                                            <div className="input-group-custom">
                                                <label>Select Library:</label>
                                                <select value={selectedLibrary} onChange={(e) => setSelectedLibrary(e.target.value)}>
                                                    {libraries.map(lib => (
                                                        <option key={lib.name} value={lib.name}>{lib.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div className="code-editor">
                                                {selectedLibrary === 'NumPy' && `# NumPy Examples
import numpy as np

# Create arrays
arr = np.array([1, 2, 3, 4, 5])
zeros = np.zeros((3, 3))
ones = np.ones((2, 4))
random_arr = np.random.rand(5)

# Mathematical operations
squared = arr ** 2
mean_val = np.mean(arr)
std_val = np.std(arr)

print("Array:", arr)
print("Mean:", mean_val)`}
                                                {selectedLibrary === 'Pandas' && `# Pandas Examples
import pandas as pd

# Create DataFrame
data = {
    'Name': ['Alice', 'Bob', 'Charlie'],
    'Age': [25, 30, 35],
    'City': ['NYC', 'LA', 'Chicago']
}
df = pd.DataFrame(data)

# Data operations
filtered = df[df['Age'] > 25]
grouped = df.groupby('City').mean()

print(df.head())
print("\\nFiltered:\\n", filtered)`}
                                                {selectedLibrary === 'Matplotlib' && `# Matplotlib Examples
import matplotlib.pyplot as plt

# Create data
x = [1, 2, 3, 4, 5]
y = [1, 4, 9, 16, 25]

# Create plot
plt.plot(x, y, 'ro-')
plt.xlabel('X values')
plt.ylabel('Y values')
plt.title('Simple Plot')
plt.grid(True)

plt.show()`}
                                                {selectedLibrary === 'Requests' && `# Requests Examples
import requests

# GET request
response = requests.get('https://api.github.com/user', auth=('user', 'pass'))
print(response.status_code)
print(response.json())

# POST request
data = {'key': 'value'}
response = requests.post('https://httpbin.org/post', json=data)
print(response.json())`}
                                            </div>
                                            <button className="btn btn-tools/vscode mt-2"
                                                onClick={() => setOutput(`${selectedLibrary} example executed successfully!`)}>
                                                <i className="fas fa-play"></i> Run Example
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Code Editor Tab */}
                        {activeTab === 'editor' && (
                            <div>
                                <h3>Interactive Python Editor</h3>
                                <div className="code-editor">
                                    <pre>{code}</pre>
                                </div>
                                <div className="mt-3">
                                    <button
                                        className="btn btn-tools/vscode me-2"
                                        onClick={executeCode}
                                        disabled={isExecuting}
                                    >
                                        {isExecuting ? (
                                            <>
                                                <i className="fas fa-spinner fa-spin"></i> Executing...
                                            </>
                                        ) : (
                                            <>
                                                <i className="fas fa-play"></i> Run Code
                                            </>
                                        )}
                                    </button>
                                    <button className="btn btn-outline-tools/vscode">
                                        <i className="fas fa-download"></i> Download
                                    </button>
                                </div>
                                {output && (
                                    <div className="code-output">
                                        {output}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Performance Tab */}
                        {activeTab === 'performance' && (
                            <div>
                                <h3>Performance & Best Practices</h3>
                                <div className="performance-metrics">
                                    <div className="perf-metric-card">
                                        <div className="perf-metric-value">{performance.executionTime}</div>
                                        <div className="perf-metric-label">Execution Time</div>
                                    </div>
                                    <div className="perf-metric-card">
                                        <div className="perf-metric-value">{performance.memoryUsage}</div>
                                        <div className="perf-metric-label">Memory Usage</div>
                                    </div>
                                    <div className="perf-metric-card">
                                        <div className="perf-metric-value">{performance.cpuUsage}</div>
                                        <div className="perf-metric-label">CPU Usage</div>
                                    </div>
                                    <div className="perf-metric-card">
                                        <div className="perf-metric-value">{performance.linesExecuted}</div>
                                        <div className="perf-metric-label">Lines Executed</div>
                                    </div>
                                </div>

                                <div className="execution-stats">
                                    <div className="stat-item">
                                        <span className="stat-label">Python Version:</span>
                                        <span className="stat-value">3.9.7</span>
                                    </div>
                                    <div className="stat-item">
                                        <span className="stat-label">GIL Status:</span>
                                        <span className="stat-value">Active</span>
                                    </div>
                                    <div className="stat-item">
                                        <span className="stat-label">Threading:</span>
                                        <span className="stat-value">Available</span>
                                    </div>
                                    <div className="stat-item">
                                        <span className="stat-label">Async Support:</span>
                                        <span className="stat-value">Native</span>
                                    </div>
                                </div>

                                <div className="interactive-section">
                                    <h5>Best Practices</h5>
                                    <div className="row">
                                        <div className="col-md-6">
                                            <h6>Code Quality</h6>
                                            <ul className="list-unstyled">
                                                <li><i className="fas fa-check text-success"></i> Use meaningful variable names</li>
                                                <li><i className="fas fa-check text-success"></i> Write docstrings for functions</li>
                                                <li><i className="fas fa-check text-success"></i> Follow PEP 8 style guide</li>
                                                <li><i className="fas fa-check text-success"></i> Use list comprehensions wisely</li>
                                            </ul>
                                        </div>
                                        <div className="col-md-6">
                                            <h6>Performance Tips</h6>
                                            <ul className="list-unstyled">
                                                <li><i className="fas fa-rocket text-warning"></i> Use NumPy for numerical operations</li>
                                                <li><i className="fas fa-rocket text-warning"></i> Avoid global variables in loops</li>
                                                <li><i className="fas fa-rocket text-warning"></i> Use generators for large datasets</li>
                                                <li><i className="fas fa-rocket text-warning"></i> Profile code with cProfile</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Modals */}
                    {/* Add Variable Modal */}
                    <div className="modal fade" id="addVariableModal" tabIndex="-1">
                        <div className="modal-dialog">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h5 className="modal-title">Add New Variable</h5>
                                    <button type="button" className="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div className="modal-body">
                                    <div className="input-group-custom">
                                        <label>Variable Name:</label>
                                        <input
                                            type="text"
                                            value={newVariable.name}
                                            onChange={(e) => setNewVariable({ ...newVariable, name: e.target.value })}
                                            placeholder="e.g., my_var"
                                        />
                                    </div>
                                    <div className="input-group-custom">
                                        <label>Value:</label>
                                        <input
                                            type="text"
                                            value={newVariable.value}
                                            onChange={(e) => setNewVariable({ ...newVariable, value: e.target.value })}
                                            placeholder="e.g., 42 or 'hello'"
                                        />
                                    </div>
                                </div>
                                <div className="modal-footer">
                                    <button type="button" className="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                    <button type="button" className="btn btn-tools/vscode" onClick={addVariable} data-bs-dismiss="modal">Add Variable</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Add Function Modal */}
                    <div className="modal fade" id="addFunctionModal" tabIndex="-1">
                        <div className="modal-dialog modal-lg">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h5 className="modal-title">Create New Function</h5>
                                    <button type="button" className="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div className="modal-body">
                                    <div className="input-group-custom">
                                        <label>Function Name:</label>
                                        <input
                                            type="text"
                                            value={newFunction.name}
                                            onChange={(e) => setNewFunction({ ...newFunction, name: e.target.value })}
                                            placeholder="e.g., my_function"
                                        />
                                    </div>
                                    <div className="input-group-custom">
                                        <label>Parameters (comma-separated):</label>
                                        <input
                                            type="text"
                                            value={newFunction.params}
                                            onChange={(e) => setNewFunction({ ...newFunction, params: e.target.value })}
                                            placeholder="e.g., x, y, z"
                                        />
                                    </div>
                                    <div className="input-group-custom">
                                        <label>Function Body:</label>
                                        <textarea
                                            value={newFunction.body}
                                            onChange={(e) => setNewFunction({ ...newFunction, body: e.target.value })}
                                            placeholder="return x + y"
                                        />
                                    </div>
                                    <div className="input-group-custom">
                                        <label>Docstring (optional):</label>
                                        <input
                                            type="text"
                                            value={newFunction.docstring}
                                            onChange={(e) => setNewFunction({ ...newFunction, docstring: e.target.value })}
                                            placeholder="Describe what the function does"
                                        />
                                    </div>
                                </div>
                                <div className="modal-footer">
                                    <button type="button" className="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                    <button type="button" className="btn btn-tools/vscode" onClick={addFunction} data-bs-dismiss="modal">Create Function</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Learning Resources */}
                    <div className="demo-card">
                        <div className="card-header">
                            <h3><i className="fas fa-graduation-cap"></i> Learn More</h3>
                        </div>
                        <div className="card-body">
                            <div className="row">
                                <div className="col-md-6">
                                    <h5>Official Resources</h5>
                                    <ul className="list-unstyled">
                                        <li><a href="https://www.python.org/" target="_blank"><i className="fas fa-external-link-alt"></i> Python Official Site</a></li>
                                        <li><a href="https://docs.python.org/3/" target="_blank"><i className="fas fa-external-link-alt"></i> Python Documentation</a></li>
                                        <li><a href="https://pypi.org/" target="_blank"><i className="fas fa-external-link-alt"></i> PyPI (Package Index)</a></li>
                                    </ul>
                                </div>
                                <div className="col-md-6">
                                    <h5>Learning & Community</h5>
                                    <ul className="list-unstyled">
                                        <li><a href="https://www.python.org/dev/peps/pep-0008/" target="_blank"><i className="fas fa-external-link-alt"></i> PEP 8 Style Guide</a></li>
                                        <li><a href="https://realpython.com/" target="_blank"><i className="fas fa-external-link-alt"></i> Real Python Tutorials</a></li>
                                        <li><a href="https://stackoverflow.com/questions/tagged/python" target="_blank"><i className="fas fa-external-link-alt"></i> Stack Overflow</a></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
