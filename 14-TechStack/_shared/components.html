<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shared Components</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #101827;
      --text: #e5e7eb;
      --accent: #60a5fa;
      --muted: #9ca3af;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --radius: 12px;
    }
    body { font-family: 'Inter', system-ui, -apple-system; background: var(--bg); color: var(--text); padding: 24px; }
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; margin-bottom: 16px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 10px; background: linear-gradient(135deg, #2563eb, #60a5fa); color: white; text-decoration: none; font-weight: 600; }
    .btn:hover { filter: brightness(1.05); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    code, pre { background: #0f172a; color: #e0f2fe; border-radius: 8px; padding: 12px; display: block; overflow-x: auto; }
    a { color: var(--accent); }
  </style>
  <script>
    // Copy button helper
    function copyToClipboard(id) {
      const el = document.getElementById(id);
      if (!el) return;
      navigator.clipboard.writeText(el.innerText || el.textContent);
    }
  </script>
</head>
<body>
  <div class="card">
    <h2>Shared Components</h2>
    <p>Import this file's CSS/JS into interactive demos to standardize styling, buttons, grids, and copy helpers.</p>
  </div>
</body>
</html>
