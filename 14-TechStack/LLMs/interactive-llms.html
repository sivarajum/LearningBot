        .deploy-icon {

        .deploy-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .deploy-description {
            font-size: 0.9rem;
            color: #666;
        }

        .input-group-custom {
            margin-bottom: 15px;
        }

        .input-group-custom label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--llm-dark);
        }

        .input-group-custom input,

            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .input-group-custom textarea {
            min-height: 80px;
            resize: vertical;
        }

        .badge-custom {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 2px;

        .badge-success {
            background: #10B981;
            color: white;
        }

        .badge-warning {
            background: #F59E0B;
            color: white;
        }

        .badge-info {
            background: #3B82F6;
            color: white;
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .code-output {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            margin-top: 10px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>

            const [code, setCode] = useState(`# LLM Implementation with Hugging Face Transformers
import torch
from transformers import AutoTokenizer, AutoModelForCausalLM
import numpy as np

# Load pre-trained model and tokenizer
model_name = "microsoft/DialoGPT-medium"
tokenizer = AutoTokenizer.from_pretrained(model_name)
model = AutoModelForCausalLM.from_pretrained(model_name)

# Set padding token
tokenizer.pad_token = tokenizer.eos_token

def generate_response(prompt, max_length=50, temperature=0.7):
    """
    Generate a response from the LLM given a prompt
    """
    # Tokenize input
    inputs = tokenizer.encode(prompt, return_tensors="pt")

    # Generate response
    with torch.no_grad():
        outputs = model.generate(
            inputs,
            max_length=max_length,
            temperature=temperature,
            do_sample=True,
            pad_token_id=tokenizer.eos_token_id,
            num_return_sequences=1
        )

    # Decode response
    response = tokenizer.decode(outputs[0], skip_special_tokens=True)
    return response

# Example usage

response = generate_response(prompt)
print(f"Prompt: {prompt}")
print(f"Response: {response}")

# Fine-tuning example (simplified)
def fine_tune_model(training_data, epochs=3):
    """
    Fine-tune the model on custom data
    """
    from transformers import Trainer, TrainingArguments

    # Prepare dataset (simplified)
    train_dataset = prepare_dataset(training_data)

    training_args = TrainingArguments(
        output_dir="./results",
        num_train_epochs=epochs,
        per_device_train_batch_size=4,
        save_steps=500,
        save_total_limit=2,
    )

    trainer = Trainer(
        model=model,
        args=training_args,
        train_dataset=train_dataset,
    )

    trainer.train()
    return trainer

# Evaluation metrics
def calculate_perplexity(text):
    """
    Calculate perplexity of generated text
    """
    inputs = tokenizer(text, return_tensors="pt")
    with torch.no_grad():
        outputs = model(**inputs, labels=inputs["input_ids"])
        loss = outputs.loss
        perplexity = torch.exp(loss)
    return perplexity.item()

# Example evaluation
test_text = "The quick brown fox jumps over the lazy dog."
perplexity = calculate_perplexity(test_text)
print(f"Perplexity: {perplexity:.2f}")`);

                                                <li><i className="fas fa-check text-success"></i> Creative writing</li>
                                                <li><i className="fas fa-check text-success"></i> Code generation</li>
                                                <li><i className="fas fa-check text-success"></i> Summarization</li>

                                            <textarea

                                                onChange={(e) => setPrompt(e.target.value)}

                                                    <div className="template-name">{template.name}</div>

                                                    <i className="fas fa-brain"></i> Thinking...
                                                </div>
                                            )}

                                        <div className="chain-of-thought">

                                <div className="model-comparison">
                                    {models.map((model, index) => (
                                        <div key={index} className="model-card">
                                            <div className="model-name">{model.name}</div>
                                            <div className="mb-2">
                                                <strong>Provider:</strong> {model.provider}
                                            </div>
                                            <div className="model-metrics">
                                                <div className="metric-item">
                                                    <div className="metric-label">Context Window</div>
                                                    <div className="metric-value">{model.contextWindow.toLocaleString()}</div>

                                                <div className="metric-item">
                                                    <div className="metric-label">Parameters</div>
                                                    <div className="metric-value">{model.parameters}</div>
                                                </div>
                                                <div className="metric-item">
                                                    <div className="metric-label">Benchmark</div>
                                                    <div className="metric-value">{(model.benchmark * 100).toFixed(1)}%</div>
                                                </div>
                                                <div className="metric-item">
                                                    <div className="metric-label">Latency</div>
                                                    <div className="metric-value">{model.latency}</div>
                                                </div>
                                            </div>
                                            <div className="mt-2">
                                                <small className="text-muted">{model.cost}</small>
                                            </div>
                                            <button className="btn btn-outline-llm btn-sm w-100 mt-2">
                                                <i className="fas fa-play"></i> Test Model
                                            </button>
                                        </div>
                                    ))}
                                </div>

                                <div className="interactive-section">
                                    <h5>Model Selection Guide</h5>
                                    <div className="row">
                                        <div className="col-md-4">
                                            <h6>For Accuracy</h6>
                                            <p>Choose GPT-4 or Claude-3 for highest accuracy and reasoning capabilities.</p>
                                        </div>
                                        <div className="col-md-4">
                                            <h6>For Speed</h6>
                                            <p>Select Llama-3 or smaller models for faster inference and lower costs.</p>
                                        </div>
                                        <div className="col-md-4">
                                            <h6>For Context</h6>
                                            <p>Use Claude-3 for extremely long context windows (up to 200K tokens).</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'tokenization' && (
                            <div>
                                <h3>Tokenization & Text Processing</h3>
                                <div className="token-visualization">
                                    <h5>Token Breakdown</h5>
                                    <div className="input-group-custom">
                                        <label>Input Text:</label>
                                        <textarea
                                            placeholder="Enter text to tokenize..."
                                            onChange={(e) => tokenizeText(e.target.value)}
                                            defaultValue="You are a helpful AI assistant. Explain quantum computing in simple terms that a 10-year-old can understand."
                                        />
                                    </div>
                                    <div className="token-flow">
                                        {tokens.map((token, index) => (
                                            <span key={index} className="token-chip">
                                                {token}
                                            </span>
                                        ))}
                                    </div>
                                    <div className="mt-2">
                                        <strong>Total Tokens:</strong> {tokens.length}

                                        <div className="col-md-4">

                                            <p>Most common method used by GPT models. Merges frequent character pairs.</p>
                                        </div>
                                        <div className="col-md-4">
                                            <h6>WordPiece</h6>

                                            className="embedding-point"
                                            style={{
                                                left: `${point.x}%`,

                                    </div>
                                </div>

                                            Use managed services like OpenAI API, Anthropic Claude, or Google PaLM.
                                        </div>
                                        <div className="mt-2">
                                            <span className="badge badge-success">Easy Setup</span>
                                            <span className="badge badge-info">Auto-scaling</span>
                                        </div>
                                    </div>
                                    <div className="deploy-card">
                                        <div className="deploy-icon">
                                            <i className="fas fa-server"></i>
                                        </div>
                                        <div className="deploy-title">Self-hosted</div>

                                            Deploy on your own infrastructure using Docker, Kubernetes, or cloud VMs.
                                        </div>
                                        <div className="mt-2">
                                            <span className="badge badge-warning">Complex Setup</span>
                                            <span className="badge badge-success">Full Control</span>
                                        </div>

                                    <div className="deploy-card">
                                        <div className="deploy-icon">
                                            <i className="fas fa-microchip"></i>
                                        </div>
                                        <div className="deploy-title">Edge Deployment</div>
                                        <div className="deploy-description">
                                            Run models on edge devices for low-latency, offline capabilities.
                                        </div>
                                        <div className="mt-2">
                                            <span className="badge badge-info">Low Latency</span>
                                            <span className="badge badge-warning">Limited Resources</span>

                                    <div className="deploy-card">

                                        </div>

                                        </div>
                                        <div className="mt-2">
                                            <span className="badge badge-success">Flexible</span>
                                            <span className="badge badge-info">Cost-effective</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="interactive-section">
                                    <h5>Optimization Techniques</h5>
                                    <div className="row">
                                        <div className="col-md-6">
                                            <h6>Model Compression</h6>
                                            <ul className="list-unstyled">
                                                <li><i className="fas fa-compress text-success"></i> Quantization (8-bit, 4-bit)</li>
                                                <li><i className="fas fa-cut text-success"></i> Pruning and distillation</li>
                                                <li><i className="fas fa-layer-group text-success"></i> LoRA and adapters</li>
                                            </ul>
                                        </div>
                                        <div className="col-md-6">
                                            <h6>Inference Optimization</h6>
                                            <ul className="list-unstyled">
                                                <li><i className="fas fa-tachometer-alt text-success"></i> Batch processing</li>
                                                <li><i className="fas fa-memory text-success"></i> KV-cache optimization</li>
                                                <li><i className="fas fa-flash text-success"></i> Flash attention</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Code Editor Tab */}
                        {activeTab === 'editor' && (
                            <div>
                                <h3>LLM Implementation Code</h3>
                                <div className="code-editor">
                                    <pre>{code}</pre>
                                </div>
                                <div className="mt-3">
                                    <button
                                        className="btn btn-llm me-2"
                                        onClick={runCode}
                                    >
                                        <i className="fas fa-play"></i> Run Code
                                    </button>
                                    <button className="btn btn-outline-llm">
                                        <i className="fas fa-download"></i> Download Code
                                    </button>
                                </div>
                                {output && (
                                    <div className="code-output">
                                        {output}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Learning Resources */}
                    <div className="demo-card">
                        <div className="card-header">
                            <h3><i className="fas fa-graduation-cap"></i> Learn More</h3>
                        </div>
                        <div className="card-body">
                            <div className="row">
                                <div className="col-md-6">
                                    <h5>Official Resources</h5>
                                    <ul className="list-unstyled">
                                        <li><a href="https://platform.openai.com/docs/introduction" target="_blank"><i className="fas fa-external-link-alt"></i> OpenAI API</a></li>
                                        <li><a href="https://huggingface.co/docs/transformers/index" target="_blank"><i className="fas fa-external-link-alt"></i> Hugging Face Transformers</a></li>
                                        <li><a href="https://docs.anthropic.com/claude/docs" target="_blank"><i className="fas fa-external-link-alt"></i> Anthropic Claude</a></li>
                                    </ul>
                                </div>
                                <div className="col-md-6">
                                    <h5>Learning & Community</h5>
                                    <ul className="list-unstyled">
                                        <li><a href="https://lilianweng.github.io/posts/2023-03-15-prompt-engineering/" target="_blank"><i className="fas fa-external-link-alt"></i> Prompt Engineering Guide</a></li>
                                        <li><a href="https://arxiv.org/abs/2005.14165" target="_blank"><i className="fas fa-external-link-alt"></i> Language Models are Few-Shot Learners</a></li>
                                        <li><a href="https://stackoverflow.com/questions/tagged/large-language-models" target="_blank"><i className="fas fa-external-link-alt"></i> Stack Overflow</a></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
