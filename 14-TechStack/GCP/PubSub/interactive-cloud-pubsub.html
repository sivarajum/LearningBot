<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Pub/Sub Interactive Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gcp-blue: #4285F4;
            --gcp-red: #EA4335;
            --gcp-yellow: #FBBC05;
            --gcp-green: #34A853;
            --gcp-purple: #9C27B0;
            --gcp-dark: #202124;
            --gcp-light: #FFFFFF;
            --gcp-gray: #F8F9FA;
            --primary-color: #4285F4;
            --secondary-color: #EA4335;
            --accent-color: #34A853;
            --warning-color: #FBBC05;
            --info-color: #9C27B0;
            --dark-color: #202124;
            --light-color: #F8F9FA;
        }

        body {
            font-family: 'Google Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4285F4 0%, #9C27B0 100%);
            min-height: 100vh;
            margin: 0;
            color: var(--gcp-dark);
        }

        .demo-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .demo-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .demo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border: none;
        }

        .card-header h3 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card-body {
            padding: 25px;
        }

        .code-editor {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            overflow-x: auto;
            border: 1px solid #ccc;
            min-height: 200px;
        }

        .btn-gcp {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-gcp:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            color: white;
        }

        .btn-outline-gcp {
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            background: transparent;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-outline-gcp:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .feature-card {
            background: var(--gcp-gray);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .feature-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--gcp-dark);
        }

        .feature-description {
            color: #666;
            font-size: 0.9rem;
        }

        .interactive-section {
            background: var(--gcp-gray);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .tab-content {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e0e0e0;
        }

        .message-flow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(90deg, #4285F4, #34A853);
            border-radius: 10px;
            color: white;
        }

        .flow-step {
            text-align: center;
            flex: 1;
        }

        .flow-arrow {
            font-size: 2rem;
            margin: 0 10px;
        }

        .topic-card,
        .subscription-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid var(--primary-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message-item {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 10px;
            margin: 5px 0;
            border-left: 3px solid var(--accent-color);
        }

        .performance-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .perf-metric-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .perf-metric-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .perf-metric-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .execution-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--gcp-gray);
            border-radius: 6px;
        }

        .stat-label {
            font-weight: 600;
            color: var(--gcp-dark);
        }

        .stat-value {
            color: var(--primary-color);
            font-weight: 500;
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .code-output {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            margin-top: 10px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid #f5c6cb;
        }

        .input-group-custom {
            margin-bottom: 15px;
        }

        .input-group-custom label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--gcp-dark);
        }

        .input-group-custom input,
        .input-group-custom select,
        .input-group-custom textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .input-group-custom textarea {
            min-height: 80px;
            resize: vertical;
        }

        .badge-custom {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 2px;
        }

        .badge-success {
            background: #28a745;
            color: white;
        }

        .badge-warning {
            background: #ffc107;
            color: black;
        }

        .badge-info {
            background: #17a2b8;
            color: white;
        }

        .badge-secondary {
            background: #6c757d;
            color: white;
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('overview');
            const [topics, setTopics] = useState([
                { id: 'orders-topic', name: 'orders-topic', description: 'Order processing messages', messageCount: 1250 },
                { id: 'user-events', name: 'user-events', description: 'User activity events', messageCount: 3400 },
                { id: 'notifications', name: 'notifications', description: 'System notifications', messageCount: 890 }
            ]);
            const [subscriptions, setSubscriptions] = useState([
                { id: 'order-processor', topicId: 'orders-topic', type: 'pull', ackDeadline: 60, messageCount: 45 },
                { id: 'email-service', topicId: 'user-events', type: 'push', endpoint: 'https://api.example.com/email', messageCount: 23 },
                { id: 'analytics-sub', topicId: 'user-events', type: 'pull', ackDeadline: 30, messageCount: 12 }
            ]);
            const [messages, setMessages] = useState([
                { id: 'msg-001', topicId: 'orders-topic', data: '{"orderId": "12345", "amount": 99.99}', timestamp: '2024-01-15T10:30:00Z', acked: false },
                { id: 'msg-002', topicId: 'user-events', data: '{"userId": "user123", "action": "login"}', timestamp: '2024-01-15T10:31:00Z', acked: false },
                { id: 'msg-003', topicId: 'notifications', data: '{"type": "system", "message": "Server maintenance"}', timestamp: '2024-01-15T10:32:00Z', acked: true }
            ]);
            const [newTopic, setNewTopic] = useState({ name: '', description: '' });
            const [newSubscription, setNewSubscription] = useState({ name: '', topicId: '', type: 'pull', ackDeadline: 60, endpoint: '' });
            const [newMessage, setNewMessage] = useState({ topicId: '', data: '' });
            const [projectState, setProjectState] = useState({
                projectId: 'my-pubsub-project',
                region: 'us-central1',
                network: 'default'
            });
            const [performance, setPerformance] = useState({
                topics: 3,
                subscriptions: 3,
                messagesPerSecond: 1250,
                throughput: '2.5 GB/s',
                latency: 15,
                cost: 45.67
            });
            const [codeOutput, setCodeOutput] = useState('');
            const [isExecuting, setIsExecuting] = useState(false);

            const executeCode = async (code) => {
                setIsExecuting(true);
                setCodeOutput('Executing code...\n');

                // Simulate code execution
                setTimeout(() => {
                    setCodeOutput(prev => prev + 'Code executed successfully!\n' +
                        '✓ Topic created: my-topic\n' +
                        '✓ Subscription created: my-subscription\n' +
                        '✓ Message published successfully\n' +
                        '✓ Message received and processed\n');
                    setIsExecuting(false);
                }, 2000);
            };

            const createTopic = () => {
                if (newTopic.name && newTopic.description) {
                    const topic = {
                        id: newTopic.name,
                        name: newTopic.name,
                        description: newTopic.description,
                        messageCount: 0
                    };
                    setTopics([...topics, topic]);
                    setNewTopic({ name: '', description: '' });
                    setCodeOutput('Topic created successfully!');
                }
            };

            const createSubscription = () => {
                if (newSubscription.name && newSubscription.topicId) {
                    const subscription = {
                        id: newSubscription.name,
                        topicId: newSubscription.topicId,
                        type: newSubscription.type,
                        ackDeadline: newSubscription.ackDeadline,
                        endpoint: newSubscription.type === 'push' ? newSubscription.endpoint : null,
                        messageCount: 0
                    };
                    setSubscriptions([...subscriptions, subscription]);
                    setNewSubscription({ name: '', topicId: '', type: 'pull', ackDeadline: 60, endpoint: '' });
                    setCodeOutput('Subscription created successfully!');
                }
            };

            const publishMessage = () => {
                if (newMessage.topicId && newMessage.data) {
                    const message = {
                        id: `msg-${Date.now()}`,
                        topicId: newMessage.topicId,
                        data: newMessage.data,
                        timestamp: new Date().toISOString(),
                        acked: false
                    };
                    setMessages([...messages, message]);

                    // Update topic message count
                    setTopics(topics.map(topic =>
                        topic.id === newMessage.topicId
                            ? { ...topic, messageCount: topic.messageCount + 1 }
                            : topic
                    ));

                    setNewMessage({ topicId: '', data: '' });
                    setCodeOutput('Message published successfully!');
                }
            };

            const acknowledgeMessage = (messageId) => {
                setMessages(messages.map(msg =>
                    msg.id === messageId ? { ...msg, acked: true } : msg
                ));
                setCodeOutput('Message acknowledged!');
            };

            return (
                <div className="demo-container">
                    {/* Header */}
                    <div className="header">
                        <h1><i className="fas fa-envelope"></i> Cloud Pub/Sub</h1>
                        <p>Real-time messaging service for event-driven applications</p>
                    </div>

                    {/* Navigation Tabs */}
                    <ul className="nav nav-tabs justify-content-center mb-4">
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'overview' ? 'active' : ''}`}
                                onClick={() => setActiveTab('overview')}>
                                <i className="fas fa-info-circle"></i> Overview
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'topics' ? 'active' : ''}`}
                                onClick={() => setActiveTab('topics')}>
                                <i className="fas fa-bullhorn"></i> Topics
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'subscriptions' ? 'active' : ''}`}
                                onClick={() => setActiveTab('subscriptions')}>
                                <i className="fas fa-users"></i> Subscriptions
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'messages' ? 'active' : ''}`}
                                onClick={() => setActiveTab('messages')}>
                                <i className="fas fa-envelope-open"></i> Messages
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'code' ? 'active' : ''}`}
                                onClick={() => setActiveTab('code')}>
                                <i className="fas fa-code"></i> Code Editor
                            </button>
                        </li>
                        <li className="nav-item">
                            <button className={`nav-link ${activeTab === 'performance' ? 'active' : ''}`}
                                onClick={() => setActiveTab('performance')}>
                                <i className="fas fa-tachometer-alt"></i> Performance
                            </button>
                        </li>
                    </ul>

                    {/* Tab Content */}
                    <div className="tab-content">
                        {/* Overview Tab */}
                        {activeTab === 'overview' && (
                            <div>
                                <div className="feature-grid">
                                    <div className="feature-card">
                                        <div className="feature-icon">
                                            <i className="fas fa-infinity"></i>
                                        </div>
                                        <div className="feature-title">Global Scale</div>
                                        <div className="feature-description">
                                            Handle millions of messages per second with global distribution and automatic scaling.
                                        </div>
                                    </div>
                                    <div className="feature-card">
                                        <div className="feature-icon">
                                            <i className="fas fa-clock"></i>
                                        </div>
                                        <div className="feature-title">Real-time Delivery</div>
                                        <div className="feature-description">
                                            Deliver messages with low latency and exactly-once delivery guarantees.
                                        </div>
                                    </div>
                                    <div className="feature-card">
                                        <div className="feature-icon">
                                            <i className="fas fa-filter"></i>
                                        </div>
                                        <div className="feature-title">Message Filtering</div>
                                        <div className="feature-description">
                                            Filter messages based on attributes to deliver only relevant data to subscribers.
                                        </div>
                                    </div>
                                    <div className="feature-card">
                                        <div className="feature-icon">
                                            <i className="fas fa-shield-alt"></i>
                                        </div>
                                        <div className="feature-title">Security & Compliance</div>
                                        <div className="feature-description">
                                            Enterprise-grade security with encryption, IAM, and compliance certifications.
                                        </div>
                                    </div>
                                </div>

                                <div className="message-flow">
                                    <div className="flow-step">
                                        <i className="fas fa-paper-plane fa-2x"></i>
                                        <div>Publisher</div>
                                        <small>Sends messages to topics</small>
                                    </div>
                                    <div className="flow-arrow">→</div>
                                    <div className="flow-step">
                                        <i className="fas fa-bullhorn fa-2x"></i>
                                        <div>Topic</div>
                                        <small>Message routing hub</small>
                                    </div>
                                    <div className="flow-arrow">→</div>
                                    <div className="flow-step">
                                        <i className="fas fa-users fa-2x"></i>
                                        <div>Subscription</div>
                                        <small>Message delivery config</small>
                                    </div>
                                    <div className="flow-arrow">→</div>
                                    <div className="flow-step">
                                        <i className="fas fa-server fa-2x"></i>
                                        <div>Subscriber</div>
                                        <small>Receives and processes</small>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Topics Tab */}
                        {activeTab === 'topics' && (
                            <div>
                                <div className="d-flex justify-content-between align-items-center mb-4">
                                    <h3>Topics Management</h3>
                                    <button className="btn btn-gcp" data-bs-toggle="modal" data-bs-target="#createTopicModal">
                                        <i className="fas fa-plus"></i> Create Topic
                                    </button>
                                </div>

                                <div className="row">
                                    {topics.map(topic => (
                                        <div key={topic.id} className="col-md-4 mb-3">
                                            <div className="topic-card">
                                                <h5>{topic.name}</h5>
                                                <p className="text-muted">{topic.description}</p>
                                                <div className="d-flex justify-content-between">
                                                    <span className="badge badge-info">
                                                        {topic.messageCount} messages
                                                    </span>
                                                    <button className="btn btn-sm btn-outline-danger">
                                                        <i className="fas fa-trash"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Subscriptions Tab */}
                        {activeTab === 'subscriptions' && (
                            <div>
                                <div className="d-flex justify-content-between align-items-center mb-4">
                                    <h3>Subscriptions Management</h3>
                                    <button className="btn btn-gcp" data-bs-toggle="modal" data-bs-target="#createSubscriptionModal">
                                        <i className="fas fa-plus"></i> Create Subscription
                                    </button>
                                </div>

                                <div className="row">
                                    {subscriptions.map(sub => (
                                        <div key={sub.id} className="col-md-6 mb-3">
                                            <div className="subscription-card">
                                                <h5>{sub.id}</h5>
                                                <p className="text-muted">Topic: {sub.topicId}</p>
                                                <div className="d-flex justify-content-between align-items-center">
                                                    <div>
                                                        <span className={`badge ${sub.type === 'push' ? 'badge-success' : 'badge-info'}`}>
                                                            {sub.type.toUpperCase()}
                                                        </span>
                                                        {sub.type === 'pull' && (
                                                            <span className="badge badge-secondary ms-1">
                                                                {sub.ackDeadline}s ack
                                                            </span>
                                                        )}
                                                    </div>
                                                    <span className="badge badge-warning">
                                                        {sub.messageCount} pending
                                                    </span>
                                                </div>
                                                {sub.endpoint && (
                                                    <small className="text-muted">Endpoint: {sub.endpoint}</small>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Messages Tab */}
                        {activeTab === 'messages' && (
                            <div>
                                <div className="d-flex justify-content-between align-items-center mb-4">
                                    <h3>Message Publishing</h3>
                                    <button className="btn btn-gcp" data-bs-toggle="modal" data-bs-target="#publishMessageModal">
                                        <i className="fas fa-paper-plane"></i> Publish Message
                                    </button>
                                </div>

                                <div className="row">
                                    <div className="col-md-6">
                                        <h5>Recent Messages</h5>
                                        {messages.slice(-5).map(message => (
                                            <div key={message.id} className="message-item">
                                                <div className="d-flex justify-content-between">
                                                    <strong>{message.topicId}</strong>
                                                    <small>{new Date(message.timestamp).toLocaleTimeString()}</small>
                                                </div>
                                                <div className="mt-2">
                                                    <code>{message.data}</code>
                                                </div>
                                                <div className="mt-2">
                                                    {!message.acked ? (
                                                        <button
                                                            className="btn btn-sm btn-success"
                                                            onClick={() => acknowledgeMessage(message.id)}
                                                        >
                                                            <i className="fas fa-check"></i> Acknowledge
                                                        </button>
                                                    ) : (
                                                        <span className="badge badge-success">Acknowledged</span>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="col-md-6">
                                        <h5>Message Flow Simulation</h5>
                                        <div className="interactive-section">
                                            <p>Watch messages flow through the system in real-time:</p>
                                            <div className="text-center">
                                                <button className="btn btn-gcp pulse-animation">
                                                    <i className="fas fa-play"></i> Start Message Flow
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Code Editor Tab */}
                        {activeTab === 'code' && (
                            <div>
                                <h3>Interactive Code Editor</h3>
                                <div className="code-editor">
                                    {`# Cloud Pub/Sub Python Example
from google.cloud import pubsub_v1
import json

# Initialize publisher and subscriber
publisher = pubsub_v1.PublisherClient()
subscriber = pubsub_v1.SubscriberClient()

# Create topic
topic_path = publisher.topic_path('my-project', 'my-topic')
topic = publisher.create_topic(request={"name": topic_path})

# Create subscription
subscription_path = subscriber.subscription_path('my-project', 'my-subscription')
subscription = subscriber.create_subscription(
    request={"name": subscription_path, "topic": topic_path}
)

# Publish message
data = json.dumps({"message": "Hello, Pub/Sub!"}).encode("utf-8")
future = publisher.publish(topic_path, data)
message_id = future.result()

# Subscribe to messages
def callback(message):
    print(f"Received: {message.data.decode('utf-8')}")
    message.ack()

subscriber.subscribe(subscription_path, callback=callback)`}
                                </div>
                                <div className="mt-3">
                                    <button
                                        className="btn btn-gcp me-2"
                                        onClick={() => executeCode('pubsub-code')}
                                        disabled={isExecuting}
                                    >
                                        {isExecuting ? (
                                            <>
                                                <i className="fas fa-spinner fa-spin"></i> Executing...
                                            </>
                                        ) : (
                                            <>
                                                <i className="fas fa-play"></i> Run Code
                                            </>
                                        )}
                                    </button>
                                    <button className="btn btn-outline-gcp">
                                        <i className="fas fa-download"></i> Download
                                    </button>
                                </div>
                                {codeOutput && (
                                    <div className="code-output">
                                        {codeOutput}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Performance Tab */}
                        {activeTab === 'performance' && (
                            <div>
                                <h3>Performance Metrics</h3>
                                <div className="performance-metrics">
                                    <div className="perf-metric-card">
                                        <div className="perf-metric-value">{performance.topics}</div>
                                        <div className="perf-metric-label">Active Topics</div>
                                    </div>
                                    <div className="perf-metric-card">
                                        <div className="perf-metric-value">{performance.subscriptions}</div>
                                        <div className="perf-metric-label">Subscriptions</div>
                                    </div>
                                    <div className="perf-metric-card">
                                        <div className="perf-metric-value">{performance.messagesPerSecond}</div>
                                        <div className="perf-metric-label">Messages/sec</div>
                                    </div>
                                    <div className="perf-metric-card">
                                        <div className="perf-metric-value">{performance.latency}ms</div>
                                        <div className="perf-metric-label">Avg Latency</div>
                                    </div>
                                </div>

                                <div className="execution-stats">
                                    <div className="stat-item">
                                        <span className="stat-label">Throughput:</span>
                                        <span className="stat-value">{performance.throughput}</span>
                                    </div>
                                    <div className="stat-item">
                                        <span className="stat-label">Project ID:</span>
                                        <span className="stat-value">{projectState.projectId}</span>
                                    </div>
                                    <div className="stat-item">
                                        <span className="stat-label">Region:</span>
                                        <span className="stat-value">{projectState.region}</span>
                                    </div>
                                    <div className="stat-item">
                                        <span className="stat-label">Cost (24h):</span>
                                        <span className="stat-value">${performance.cost}</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Modals */}
                    {/* Create Topic Modal */}
                    <div className="modal fade" id="createTopicModal" tabIndex="-1">
                        <div className="modal-dialog">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h5 className="modal-title">Create New Topic</h5>
                                    <button type="button" className="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div className="modal-body">
                                    <div className="input-group-custom">
                                        <label>Topic Name:</label>
                                        <input
                                            type="text"
                                            value={newTopic.name}
                                            onChange={(e) => setNewTopic({ ...newTopic, name: e.target.value })}
                                            placeholder="e.g., my-topic"
                                        />
                                    </div>
                                    <div className="input-group-custom">
                                        <label>Description:</label>
                                        <input
                                            type="text"
                                            value={newTopic.description}
                                            onChange={(e) => setNewTopic({ ...newTopic, description: e.target.value })}
                                            placeholder="Topic description"
                                        />
                                    </div>
                                </div>
                                <div className="modal-footer">
                                    <button type="button" className="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                    <button type="button" className="btn btn-gcp" onClick={createTopic} data-bs-dismiss="modal">Create Topic</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Create Subscription Modal */}
                    <div className="modal fade" id="createSubscriptionModal" tabIndex="-1">
                        <div className="modal-dialog modal-lg">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h5 className="modal-title">Create New Subscription</h5>
                                    <button type="button" className="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div className="modal-body">
                                    <div className="row">
                                        <div className="col-md-6">
                                            <div className="input-group-custom">
                                                <label>Subscription Name:</label>
                                                <input
                                                    type="text"
                                                    value={newSubscription.name}
                                                    onChange={(e) => setNewSubscription({ ...newSubscription, name: e.target.value })}
                                                    placeholder="e.g., my-subscription"
                                                />
                                            </div>
                                        </div>
                                        <div className="col-md-6">
                                            <div className="input-group-custom">
                                                <label>Topic:</label>
                                                <select
                                                    value={newSubscription.topicId}
                                                    onChange={(e) => setNewSubscription({ ...newSubscription, topicId: e.target.value })}
                                                >
                                                    <option value="">Select Topic</option>
                                                    {topics.map(topic => (
                                                        <option key={topic.id} value={topic.id}>{topic.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="row">
                                        <div className="col-md-6">
                                            <div className="input-group-custom">
                                                <label>Delivery Type:</label>
                                                <select
                                                    value={newSubscription.type}
                                                    onChange={(e) => setNewSubscription({ ...newSubscription, type: e.target.value })}
                                                >
                                                    <option value="pull">Pull</option>
                                                    <option value="push">Push</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="col-md-6">
                                            <div className="input-group-custom">
                                                <label>Ack Deadline (seconds):</label>
                                                <input
                                                    type="number"
                                                    value={newSubscription.ackDeadline}
                                                    onChange={(e) => setNewSubscription({ ...newSubscription, ackDeadline: parseInt(e.target.value) })}
                                                    min="10"
                                                    max="600"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                    {newSubscription.type === 'push' && (
                                        <div className="input-group-custom">
                                            <label>Push Endpoint URL:</label>
                                            <input
                                                type="url"
                                                value={newSubscription.endpoint}
                                                onChange={(e) => setNewSubscription({ ...newSubscription, endpoint: e.target.value })}
                                                placeholder="https://your-endpoint.com/webhook"
                                            />
                                        </div>
                                    )}
                                </div>
                                <div className="modal-footer">
                                    <button type="button" className="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                    <button type="button" className="btn btn-gcp" onClick={createSubscription} data-bs-dismiss="modal">Create Subscription</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Publish Message Modal */}
                    <div className="modal fade" id="publishMessageModal" tabIndex="-1">
                        <div className="modal-dialog">
                            <div className="modal-content">
                                <div className="modal-header">
                                    <h5 className="modal-title">Publish Message</h5>
                                    <button type="button" className="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div className="modal-body">
                                    <div className="input-group-custom">
                                        <label>Topic:</label>
                                        <select
                                            value={newMessage.topicId}
                                            onChange={(e) => setNewMessage({ ...newMessage, topicId: e.target.value })}
                                        >
                                            <option value="">Select Topic</option>
                                            {topics.map(topic => (
                                                <option key={topic.id} value={topic.id}>{topic.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="input-group-custom">
                                        <label>Message Data (JSON):</label>
                                        <textarea
                                            value={newMessage.data}
                                            onChange={(e) => setNewMessage({ ...newMessage, data: e.target.value })}
                                            placeholder='{"key": "value"}'
                                        />
                                    </div>
                                </div>
                                <div className="modal-footer">
                                    <button type="button" className="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                    <button type="button" className="btn btn-gcp" onClick={publishMessage} data-bs-dismiss="modal">Publish Message</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Learning Resources */}
                    <div className="demo-card">
                        <div className="card-header">
                            <h3><i className="fas fa-book"></i> Learn More</h3>
                        </div>
                        <div className="card-body">
                            <div className="row">
                                <div className="col-md-6">
                                    <h5>Official Resources</h5>
                                    <ul className="list-unstyled">
                                        <li><a href="https://cloud.google.com/pubsub" target="_blank"><i className="fas fa-external-link-alt"></i> Cloud Pub/Sub Site</a></li>
                                        <li><a href="https://cloud.google.com/pubsub/docs" target="_blank"><i className="fas fa-external-link-alt"></i> Documentation</a></li>
                                        <li><a href="https://console.cloud.google.com/cloudpubsub" target="_blank"><i className="fas fa-external-link-alt"></i> Cloud Console</a></li>
                                    </ul>
                                </div>
                                <div className="col-md-6">
                                    <h5>Learning & Community</h5>
                                    <ul className="list-unstyled">
                                        <li><a href="https://cloud.google.com/pubsub/docs/quickstarts" target="_blank"><i className="fas fa-external-link-alt"></i> Quickstarts</a></li>
                                        <li><a href="https://cloud.google.com/pubsub/docs/tutorials" target="_blank"><i className="fas fa-external-link-alt"></i> Tutorials</a></li>
                                        <li><a href="https://stackoverflow.com/questions/tagged/google-cloud-pubsub" target="_blank"><i className="fas fa-external-link-alt"></i> Stack Overflow</a></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('app'));
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
