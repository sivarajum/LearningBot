<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLOps Interactive Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --mlops-green: #10B981;
            --mlops-blue: #3B82F6;
            --mlops-purple: #8B5CF6;
            --mlops-orange: #F59E0B;
            --mlops-red: #EF4444;
            --mlops-dark: #1F2937;
            --mlops-light: #F9FAFB;
            --primary-color: #10B981;
            --secondary-color: #3B82F6;
            --accent-color: #8B5CF6;
            --warning-color: #F59E0B;
            --info-color: #EF4444;
            --dark-color: #1F2937;
            --light-color: #F9FAFB;
        }

        body {
            font-family: 'JetBrains Mono', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #10B981 0%, #3B82F6 100%);
            min-height: 100vh;
            margin: 0;
            color: var(--mlops-dark);
        }

        .demo-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .demo-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .demo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border: none;
        }

        .card-header h3 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card-body {
            padding: 25px;
        }

        .code-editor {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            overflow-x: auto;
            border: 1px solid #ccc;
            min-height: 200px;
        }

        .btn-mlops {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-mlops:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            color: white;
        }

        .btn-outline-mlops {
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            background: transparent;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-outline-mlops:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .feature-card {
            background: var(--mlops-light);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .feature-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--mlops-dark);
        }

        .feature-description {
            color: #666;
            font-size: 0.9rem;
        }

        .interactive-section {
            background: var(--mlops-light);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .tab-content {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e0e0e0;
        }

        .mlops-pipeline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(90deg, #10B981, #8B5CF6);
            border-radius: 10px;
            color: white;
        }

        .pipeline-step {
            text-align: center;
            flex: 1;
        }

        .pipeline-arrow {
            font-size: 2rem;
            margin: 0 10px;
        }

        .model-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid var(--primary-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .deployment-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }

        .deployment-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .performance-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .perf-metric-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .perf-metric-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .perf-metric-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .execution-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--mlops-light);
            border-radius: 6px;
        }

        .stat-label {
            font-weight: 600;
            color: var(--mlops-dark);
        }

        .stat-value {
            color: var(--primary-color);
            font-weight: 500;
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .code-output {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            margin-top: 10px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            border: 1px solid #f5c6cb;
        }

        .input-group-custom {
            margin-bottom: 15px;
        }

        .input-group-custom label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--mlops-dark);
        }

        .input-group-custom input,
        .input-group-custom select,
        .input-group-custom textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        .input-group-custom textarea {
            min-height: 80px;
            resize: vertical;
        }

        .badge-custom {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            margin: 2px;
        }

        .badge-success {
            background: #10B981;
            color: white;
        }

        .badge-warning {
            background: #F59E0B;
            color: white;
        }

        .badge-danger {
            background: #EF4444;
            color: white;
        }

        .badge-info {
            background: #3B82F6;
            color: white;
        }

        .pipeline-visual {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .pipeline-stage {
            background: var(--primary-color);
            color: white;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
        }

        .monitoring-chart {
            background: var(--mlops-light);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            min-height: 150px;
            position: relative;
        }

        .metric-line {
            position: absolute;
            height: 2px;
            background: var(--primary-color);
            border-radius: 1px;
        }

        .metric-point {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
        }

        .drift-indicator {
            background: var(--mlops-light);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }

        .drift-bar {
            background: var(--secondary-color);
            height: 20px;
            border-radius: 4px;
            margin: 5px 0;
            position: relative;
        }

        .drift-fill {
            background: var(--warning-color);
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .experiment-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
        }

        .ab-test {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 15px 0;
        }

        .test-variant {
            background: var(--mlops-light);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .variant-a {
            border-left: 4px solid var(--primary-color);
        }

        .variant-b {
            border-left: 4px solid var(--secondary-color);
        }
    </style>
</head>

            ]);
            const [code, setCode] = useState(`# MLOps Pipeline with MLflow
import mlflow
import mlflow.sklearn
from sklearn.ensemble import RandomForestClassifier
from sklearn.metrics import accuracy_score
import pandas as pd

# Set MLflow experiment
mlflow.set_experiment("Customer Churn Prediction")

with mlflow.start_run():
    # Load and prepare data
    data = pd.read_csv("customer_data.csv")
    X = data.drop('churn', axis=1)
    y = data['churn']

    # Model training
    model = RandomForestClassifier(n_estimators=100, random_state=42)
    model.fit(X, y)

    # Predictions and metrics
    predictions = model.predict(X)
    accuracy = accuracy_score(y, predictions)

    # Log parameters, metrics, and model
    mlflow.log_param("n_estimators", 100)
    mlflow.log_metric("accuracy", accuracy)
    mlflow.sklearn.log_model(model, "model")

    print(f"Model trained with accuracy: {accuracy:.3f}")
    print("Model logged to MLflow")
